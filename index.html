<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENAMENIES</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* Animated background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,rgba(0,255,120,.15),transparent 30%),
radial-gradient(circle at 80% 60%,rgba(0,255,80,.12),transparent 35%),
linear-gradient(#050505,#080808);
animation:bgMove 12s infinite alternate;
z-index:-2;
}

@keyframes bgMove{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* ==================== LOADING SCREEN ==================== */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease;
}

#loader.hidden {
    opacity: 0;
    pointer-events: none;
}

.loader-content {
    text-align: center;
}

#spinner {
    width: 160px;
    height: 160px;
    animation: spin 1.1s linear infinite;
    filter: drop-shadow(0 0 25px #00ff66);
}

#loader p {
    margin-top: 30px;
    font-size: 18px;
    letter-spacing: 4px;
    color: #00ff66;
    opacity: 0.9;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ==================== MAINTENANCE PAGE ==================== */
.maintenance {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
}

.maintenance-content {
    max-width: 700px;
}

.logo-main {
    font-size: 52px;
    font-weight: 800;
    color: #00ff66;
    margin-bottom: 30px;
    text-shadow: 0 0 40px #00ff66;
    letter-spacing: 2px;
}

.maintenance h1 {
    font-size: 58px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #00ff66, #00cc55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.maintenance p {
    font-size: 22px;
    opacity: 0.85;
    line-height: 1.6;
    margin-bottom: 40px;
}

.status {
    display: inline-block;
    background: rgba(0, 255, 102, 0.1);
    color: #00ff66;
    padding: 12px 32px;
    border-radius: 50px;
    border: 1px solid rgba(0, 255, 102, 0.3);
    font-weight: 600;
    letter-spacing: 2px;
    font-size: 15px;
}

</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
    <div class="loader-content">
        <img id="spinner" src="https://i.imgur.com/948tzws.png" alt="Loading...">
        <p>ESTABLISHING CONNECTION...</p>
    </div>
</div>

<!-- MAINTENANCE PAGE -->
<div class="maintenance">
    <div class="maintenance-content">
        <div class="logo-main">ENAMENIES</div>
        <h1>SITE UNDER MAINTENANCE</h1>
        <p>Our crew is currently upgrading the territory and expanding intelligence networks.<br>We'll be back stronger very soon.</p>
        <div class="status">OPERATION IN PROGRESS • STAY ALERT</div>
    </div>
</div>

<script>
// Auto hide loader after 4.5 seconds
window.addEventListener('load', () => {
    setTimeout(() => {
        const loader = document.getElementById('loader');
        loader.classList.add('hidden');
        
        setTimeout(() => {
            loader.style.display = 'none';
        }, 600);
    }, 4500);
});
</script>

</body>
</html>
